name: Continuous Deployment

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    name: Production Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Stack to Host VPS
        uses: ./.github/actions/deploy
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          vps-ip: ${{ secrets.VPS_IP }}
          vps-user: ${{ secrets.VPS_USER }} # Defaults to root if not provided
          deploy-path: "/var/www/nexus"     # Path on your remote server
          branch: "master"