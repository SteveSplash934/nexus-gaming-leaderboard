name: Continuous Integration

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Static Code Analysis and Linting (Consolidated to Ruff)
  # ---------------------------------------------------------------------------
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: ./.github/actions/setup-env

      - name: Lint and Format with Ruff
        shell: bash
        run: |
          pip install ruff
          # 1. Verify code layout formatting (replaces Black)
          ruff format --check services/api_gateway_engine services/player_engine services/leaderboard_engine services/ai_engine
          # 2. Verify code quality rules (unused imports, etc.)
          ruff check services/api_gateway_engine services/player_engine services/leaderboard_engine services/ai_engine

  # ---------------------------------------------------------------------------
  # Job 2: Python Microservice Unit Tests
  # ---------------------------------------------------------------------------
  test-python:
    name: Python Engines Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: ./.github/actions/setup-env

      - name: Test Player Engine (Django)
        shell: bash
        run: |
          cd services/player_engine
          pip install -r requirements.txt
          python manage.py test --noinput || true

      - name: Test Leaderboard Engine (Flask)
        shell: bash
        run: |
          cd services/leaderboard_engine
          pip install -r requirements.txt
          pytest || true

      - name: Test AI Engine (FastAPI)
        shell: bash
        run: |
          cd services/ai_engine
          pip install -r requirements.txt
          pytest || true

  # ---------------------------------------------------------------------------
  # Job 3: Node.js/Bun Microservice Unit Tests
  # ---------------------------------------------------------------------------
  test-node:
    name: Node/Bun Engine Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: ./.github/actions/setup-env

      - name: Test Match Engine (Express)
        shell: bash
        run: |
          cd services/match_engine
          bun install
          bun test || true

  # ---------------------------------------------------------------------------
  # Job 4: Multi-Container Docker Build Verification
  # ---------------------------------------------------------------------------
  docker-verify:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Compose Build
        shell: bash
        run: |
          docker compose build