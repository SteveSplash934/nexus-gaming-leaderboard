name: 'Nexus_Gaming_Leaderboard_System'

services:
  # ---------------------------------------------------------------------------
  # 1. API Gateway Engine (Public Facing)
  # ---------------------------------------------------------------------------
  api-gateway-engine:
    build:
      context: ./services/api_gateway_engine
    container_name: nexus_api_gateway
    ports:
      - "8000:8000"
    environment:
      - PLAYER_ENGINE_URL=http://player-engine:8001
      - MATCH_ENGINE_URL=http://match-engine:8002
      - LEADERBOARD_ENGINE_URL=http://leaderboard-engine:8003
      - AI_ENGINE_URL=http://ai-engine:8004
    networks:
      - nexus_internal
    depends_on:
      - player-engine
      - match-engine
      - leaderboard-engine

  # ---------------------------------------------------------------------------
  # 2. Player Engine (Internal)
  # ---------------------------------------------------------------------------
  player-engine:
    build:
      context: ./services/player_engine
    container_name: nexus_player_engine
    expose:
      - "8001"
    volumes:
      - player_db_data:/app/data
    networks:
      - nexus_internal

  # ---------------------------------------------------------------------------
  # 3. Match Engine (Internal)
  # ---------------------------------------------------------------------------
  match-engine:
    build:
      context: ./services/match_engine
    container_name: nexus_match_engine
    expose:
      - "8002"
    volumes:
      - match_db_data:/app/data
    networks:
      - nexus_internal

  # ---------------------------------------------------------------------------
  # 4. Leaderboard Engine (Internal)
  # ---------------------------------------------------------------------------
  leaderboard-engine:
    build:
      context: ./services/leaderboard_engine
    container_name: nexus_leaderboard_engine
    expose:
      - "8003"
    environment:
      - PLAYER_ENGINE_URL=http://player-engine:8001
      - MATCH_ENGINE_URL=http://match-engine:8002
      - AI_ENGINE_URL=http://ai-engine:8004
    networks:
      - nexus_internal
    depends_on:
      - player-engine
      - match-engine
      - ai-engine

  # ---------------------------------------------------------------------------
  # 5. AI Engine (Internal)
  # ---------------------------------------------------------------------------
  ai-engine:
    build:
      context: ./services/ai_engine
    container_name: nexus_ai_engine
    expose:
      - "8004"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=gemma4:31b-cloud
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - nexus_internal

# ---------------------------------------------------------------------------
# Volumes & Networks
# ---------------------------------------------------------------------------
volumes:
  player_db_data:
    name: nexus_player_db
  match_db_data:
    name: nexus_match_db

networks:
  nexus_internal:
    name: nexus_internal_network
    driver: bridge